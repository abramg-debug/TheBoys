<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Countdown to Episode 3</title>

<style>
:root{
  --bg1:#070d18;
  --bg2:#0b1220;
  --card:rgba(18,26,43,.88);
  --text:#e8eefc;
  --muted:#9fb0d8;
  --border:rgba(255,255,255,.08);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
}

body{
  min-height:100vh;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  color:var(--text);
  overflow:hidden;
  background:
    radial-gradient(circle at 20% 20%, rgba(59,130,246,.20), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(147,51,234,.12), transparent 28%),
    radial-gradient(circle at 50% 85%, rgba(34,197,94,.10), transparent 25%),
    linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
}

.bg-image{
  position:fixed;
  inset:0;
  z-index:0;
  background:url("boys2.avif") center center / cover no-repeat;
  opacity:0.35;
  pointer-events:none;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  opacity:.35;
  background-image:
    radial-gradient(2px 2px at 12% 18%, rgba(255,255,255,.75) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 25% 70%, rgba(255,255,255,.65) 0, transparent 55%),
    radial-gradient(2px 2px at 44% 28%, rgba(255,255,255,.70) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 61% 76%, rgba(255,255,255,.60) 0, transparent 55%),
    radial-gradient(2px 2px at 77% 20%, rgba(255,255,255,.70) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 88% 62%, rgba(255,255,255,.60) 0, transparent 55%);
  animation: twinkle 5s ease-in-out infinite alternate;
}

@keyframes twinkle{
  from{opacity:.18}
  to{opacity:.4}
}

.wrap{
  position:relative;
  z-index:20;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  width:min(760px, 100%);
  text-align:center;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:30px 24px 26px;
  box-shadow:0 22px 60px rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
}

h1{
  margin:0 0 10px;
  font-size:clamp(32px, 5vw, 58px);
  line-height:1.02;
}

.sub{
  margin:0 0 22px;
  color:var(--muted);
  font-size:clamp(16px, 2.4vw, 22px);
  font-weight:700;
}

.big{
  margin:10px 0;
  font-size:clamp(48px, 11vw, 106px);
  line-height:1;
  font-weight:900;
  letter-spacing:.05em;
  text-shadow:
    0 0 8px rgba(96,165,250,.30),
    0 0 18px rgba(96,165,250,.28),
    0 0 36px rgba(96,165,250,.18);
}

.status{
  margin:0;
  font-size:clamp(17px, 2.3vw, 24px);
  color:var(--muted);
  font-weight:700;
}

.note{
  margin-top:14px;
  font-size:13px;
  color:var(--muted);
  opacity:.9;
}

.live-badge{
  display:inline-block;
  margin-bottom:14px;
  padding:8px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);
  color:#dbeafe;
  font-size:12px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.float-logo{
  position:fixed;
  left:0;
  top:0;
  height:auto;
  z-index:5;
  pointer-events:none;
  user-select:none;
  opacity:.98;
  filter:drop-shadow(0 12px 25px rgba(0,0,0,.5));
  will-change:transform;
}
</style>
</head>
<body>

<div class="bg-image"></div>

<div class="wrap">
  <div class="card" id="card">
    <div class="live-badge" id="badge">Tonight at 8:00 PM</div>
    <h1>Countdown to Episode 3</h1>
    <p class="sub" id="sub">Premieres tonight at 8:00 PM</p>
    <div class="big" id="countdown">--:--:--</div>
    <p class="status" id="status">Counting down…</p>
    <div class="note" id="targetText"></div>
  </div>
</div>

<script>
const countdownEl = document.getElementById("countdown");
const statusEl = document.getElementById("status");
const targetTextEl = document.getElementById("targetText");
const badgeEl = document.getElementById("badge");
const subEl = document.getElementById("sub");

function getTonightAt8() {
  const target = new Date();
  target.setHours(20, 0, 0, 0);
  return target;
}

function formatTarget(date) {
  return date.toLocaleString([], {
    weekday: "long",
    month: "long",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function updateCountdown() {
  const now = new Date();
  const target = getTonightAt8();
  const diff = target - now;

  targetTextEl.textContent = "Target time: " + formatTarget(target);

  if (diff <= 0) {
    countdownEl.textContent = "LIVE";
    statusEl.textContent = "Episode 3 is on now";
    badgeEl.textContent = "Now Streaming";
    subEl.textContent = "Episode 3 is live";
    return;
  }

  const hours = Math.floor(diff / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);

  countdownEl.textContent =
    String(hours).padStart(2, "0") + ":" +
    String(minutes).padStart(2, "0") + ":" +
    String(seconds).padStart(2, "0");

  statusEl.textContent = "Counting down…";
  badgeEl.textContent = "Tonight at 8:00 PM";
  subEl.textContent = "Premieres tonight at 8:00 PM";
}

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function randSign() {
  return Math.random() < 0.5 ? -1 : 1;
}

class FloatingLogo {
  constructor(el, opts) {
    this.el = el;
    this.w = opts.w;
    this.h = opts.h;
    this.x = opts.x;
    this.y = opts.y;
    this.vx = opts.vx;
    this.vy = opts.vy;
    this.rot = opts.rot;
    this.rotSpeed = opts.rotSpeed;
    this.margin = 12;

    this.el.style.width = this.w + "px";
    this.draw();
  }

  draw() {
    this.el.style.transform = `translate(${this.x}px, ${this.y}px) rotate(${this.rot}deg)`;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.rot += this.rotSpeed;

    const maxX = window.innerWidth - this.w - this.margin;
    const maxY = window.innerHeight - this.h - this.margin;

    if (this.x <= this.margin) {
      this.x = this.margin;
      this.vx *= -1;
    } else if (this.x >= maxX) {
      this.x = maxX;
      this.vx *= -1;
    }

    if (this.y <= this.margin) {
      this.y = this.margin;
      this.vy *= -1;
    } else if (this.y >= maxY) {
      this.y = maxY;
      this.vy *= -1;
    }

    this.draw();
  }
}

const logos = [];

function buildLogos(imgRef) {
  const aspect = imgRef.naturalWidth / imgRef.naturalHeight;

  for (let i = 0; i < 6; i++) {
    const img = document.createElement("img");
    img.className = "float-logo";
    img.src = "boys.png";
    img.alt = "The Boys Logo " + (i + 1);
    document.body.appendChild(img);

    const w = rand(90, 170);
    const h = w / aspect;

    const x = rand(20, Math.max(20, window.innerWidth - w - 20));
    const y = rand(20, Math.max(20, window.innerHeight - h - 20));

    logos.push(new FloatingLogo(img, {
      w,
      h,
      x,
      y,
      vx: rand(0.18, 0.42) * randSign(),
      vy: rand(0.18, 0.42) * randSign(),
      rot: rand(-8, 8),
      rotSpeed: rand(0.005, 0.02) * randSign()
    }));
  }

  requestAnimationFrame(animate);
}

function animate() {
  for (const logo of logos) {
    logo.update();
  }
  requestAnimationFrame(animate);
}

window.addEventListener("resize", () => {
  for (const logo of logos) {
    const maxX = Math.max(logo.margin, window.innerWidth - logo.w - logo.margin);
    const maxY = Math.max(logo.margin, window.innerHeight - logo.h - logo.margin);
    logo.x = Math.min(Math.max(logo.margin, logo.x), maxX);
    logo.y = Math.min(Math.max(logo.margin, logo.y), maxY);
    logo.draw();
  }
});

updateCountdown();
setInterval(updateCountdown, 1000);

const preload = new Image();
preload.onload = () => buildLogos(preload);
preload.onerror = () => {
  alert('boys.png was not found. Make sure the file is named exactly "boys.png" and is in the same folder as this HTML file.');
};
preload.src = "boys.png";
</script>

</body>
</html>
